version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      non-breaking-changes:
        update-types: [minor, patch]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      non-breaking-changes:
        update-types: [minor, patch]
